<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .dark {
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .card {
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <!-- Header & Navigation -->
    <nav class="sticky top-0 z-50 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-4 py-3 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
                <i class="fa-solid fa-wallet mr-2"></i>FinanceApp
            </h1>
            <div class="flex items-center space-x-2">
                <button id="themeToggle" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <i id="themeIcon" class="fa-solid fa-moon text-lg"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-6 space-y-6">
        
        <!-- Summary Dashboard (เงินคงเหลือขึ้นก่อน) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- ย้ายเงินคงเหลือมาอันดับแรก -->
            <div class="card bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-3xl shadow-lg text-white">
                <div class="flex items-center space-x-4">
                    <div class="p-3 bg-white/20 rounded-2xl">
                        <i class="fa-solid fa-scale-balanced text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-blue-100">เงินคงเหลือ</p>
                        <p id="balance" class="text-2xl font-bold">฿0.00</p>
                    </div>
                </div>
            </div>
            
            <div class="card bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700">
                <div class="flex items-center space-x-4">
                    <div class="p-3 bg-green-100 dark:bg-green-900/30 text-green-600 rounded-2xl">
                        <i class="fa-solid fa-arrow-trend-up text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-slate-500 dark:text-slate-400">รายรับรวม</p>
                        <p id="totalIncome" class="text-2xl font-bold text-green-600">฿0.00</p>
                    </div>
                </div>
            </div>
            
            <div class="card bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700">
                <div class="flex items-center space-x-4">
                    <div class="p-3 bg-red-100 dark:bg-red-900/30 text-red-600 rounded-2xl">
                        <i class="fa-solid fa-arrow-trend-down text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-slate-500 dark:text-slate-400">รายจ่ายรวม</p>
                        <p id="totalExpense" class="text-2xl font-bold text-red-600">฿0.00</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Left: Add Item Form & Settings -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700">
                    <h2 class="text-lg font-semibold mb-4 text-indigo-600 dark:text-indigo-400">
                        <i class="fa-solid fa-plus-circle mr-2"></i>เพิ่มรายการใหม่
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-slate-500 mb-1">รายละเอียด</label>
                            <input type="text" id="desc" class="w-full px-4 py-2 rounded-xl border border-slate-200 dark:bg-slate-900 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-slate-500 mb-1">จำนวนเงิน</label>
                                <input type="number" id="amount" class="w-full px-4 py-2 rounded-xl border border-slate-200 dark:bg-slate-900 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm text-slate-500 mb-1">ประเภท</label>
                                <select id="type" class="w-full px-4 py-2 rounded-xl border border-slate-200 dark:bg-slate-900 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="income">รายรับ</option>
                                    <option value="expense">รายจ่าย</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-slate-500 mb-1">หมวดหมู่</label>
                                <select id="category" class="w-full px-4 py-2 rounded-xl border border-slate-200 dark:bg-slate-900 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="อาหาร">อาหาร</option>
                                    <option value="เดินทาง">เดินทาง</option>
                                    <option value="ช้อปปิ้ง">ช้อปปิ้ง</option>
                                    <option value="บันเทิง">บันเทิง</option>
                                    <option value="เงินเดือน">เงินเดือน</option>
                                    <option value="ลงทุน">ลงทุน</option>
                                    <option value="อื่นๆ">อื่นๆ</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm text-slate-500 mb-1">วันที่</label>
                                <input type="date" id="date" class="w-full px-4 py-2 rounded-xl border border-slate-200 dark:bg-slate-900 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                        </div>
                        <button onclick="addItem()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-2xl transition-all shadow-md shadow-indigo-200 dark:shadow-none">
                            บันทึกรายการ
                        </button>
                    </div>
                </div>

                <!-- Google Sheets Settings -->
                <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700">
                    <h2 class="text-lg font-semibold mb-4 text-green-600 dark:text-green-400">
                        <i class="fa-brands fa-google-drive mr-2"></i>Google Sheets Sync
                    </h2>
                    <div class="space-y-3">
                        <p class="text-xs text-slate-500">เชื่อมต่อรายการใหม่ไปยัง Google Sheets อัตโนมัติ</p>
                        <input type="text" id="gsheetUrl" placeholder="วาง Web App URL ตรงนี้" class="w-full px-3 py-2 text-xs rounded-lg border border-slate-200 dark:bg-slate-900 dark:border-slate-700 outline-none focus:ring-2 focus:ring-green-500">
                        <button onclick="saveSheetSettings()" class="w-full bg-green-600 hover:bg-green-700 text-white text-sm py-2 rounded-xl transition-all">
                            บันทึกการตั้งค่า
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right: Charts & Data Table -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Charts -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 h-[350px]">
                        <h3 class="text-md font-semibold mb-4 text-center">สัดส่วนรายจ่าย</h3>
                        <canvas id="pieChart"></canvas>
                    </div>
                    <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 h-[350px]">
                        <h3 class="text-md font-semibold mb-4 text-center">เปรียบเทียบ รายรับ-รายจ่าย</h3>
                        <canvas id="barChart"></canvas>
                    </div>
                </div>

                <!-- Transaction Table -->
                <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                        <h2 class="text-lg font-semibold">รายการล่าสุด</h2>
                        <button onclick="clearAll()" class="text-xs text-red-500 hover:underline">ล้างทั้งหมด</button>
                    </div>
                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 dark:bg-slate-900/50 text-slate-500 text-sm uppercase">
                                <tr>
                                    <th class="px-6 py-4 font-medium">วันที่</th>
                                    <th class="px-6 py-4 font-medium">รายละเอียด</th>
                                    <th class="px-6 py-4 font-medium">หมวดหมู่</th>
                                    <th class="px-6 py-4 font-medium text-right">จำนวนเงิน</th>
                                    <th class="px-6 py-4 font-medium text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="transactionList" class="divide-y divide-slate-100 dark:divide-slate-700">
                                <!-- Data injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="alertContainer" class="fixed top-20 right-4 z-[100] pointer-events-none"></div>

    <script>
        // --- Initialization ---
        let transactions = JSON.parse(localStorage.getItem('fin_transactions')) || [];
        let gSheetUrl = localStorage.getItem('fin_gsheet_url') || "";
        let pieChart, barChart;

        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('gsheetUrl').value = gSheetUrl;

        // Theme Logic
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        if (localStorage.getItem('dark-mode') === 'true') {
            document.body.classList.add('dark');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('dark-mode', isDark);
            themeIcon.classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
            renderCharts(); 
        });

        // --- Core Functions ---

        function saveSheetSettings() {
            gSheetUrl = document.getElementById('gsheetUrl').value.trim();
            localStorage.setItem('fin_gsheet_url', gSheetUrl);
            showAlert('บันทึก URL สำเร็จ', 'success');
        }

        async function syncToGoogleSheet(item) {
            if (!gSheetUrl) return;
            try {
                await fetch(gSheetUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(item)
                });
                console.log('Syncing attempted...');
            } catch (error) {
                console.error('Sync error:', error);
            }
        }

        function addItem() {
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const type = document.getElementById('type').value;
            const category = document.getElementById('category').value;
            const date = document.getElementById('date').value;

            if (!desc || isNaN(amount) || amount <= 0 || !date) {
                showAlert('กรุณากรอกข้อมูลให้ครบถ้วนและถูกต้อง', 'error');
                return;
            }

            const item = {
                id: Date.now(),
                desc,
                amount,
                type,
                category,
                date
            };

            transactions.unshift(item);
            saveData();
            render();
            
            if (gSheetUrl) {
                syncToGoogleSheet(item);
                showAlert('บันทึกและส่งข้อมูลไปยัง Google Sheets แล้ว', 'success');
            } else {
                showAlert('บันทึกรายการเรียบร้อยแล้ว (เฉพาะเครื่อง)', 'success');
            }
            
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
        }

        function removeItem(id) {
            transactions = transactions.filter(t => t.id !== id);
            saveData();
            render();
        }

        function saveData() {
            localStorage.setItem('fin_transactions', JSON.stringify(transactions));
        }

        function clearAll() {
            if(confirm('คุณต้องการลบข้อมูลทั้งหมดใช่หรือไม่?')) {
                transactions = [];
                saveData();
                render();
            }
        }

        // --- UI Rendering ---

        function render() {
            const list = document.getElementById('transactionList');
            list.innerHTML = '';

            let income = 0;
            let expense = 0;

            transactions.forEach(t => {
                if (t.type === 'income') {
                    income += t.amount;
                } else {
                    expense += t.amount;
                }

                const row = document.createElement('tr');
                row.className = 'hover:bg-slate-50 dark:hover:bg-slate-900/30 transition-colors animate-fade';
                row.innerHTML = `
                    <td class="px-6 py-4 text-sm text-slate-500">${t.date}</td>
                    <td class="px-6 py-4 font-medium">${t.desc}</td>
                    <td class="px-6 py-4"><span class="px-3 py-1 bg-slate-100 dark:bg-slate-700 rounded-full text-xs">${t.category}</span></td>
                    <td class="px-6 py-4 text-right font-bold ${t.type === 'income' ? 'text-green-600' : 'text-red-500'}">
                        ${t.type === 'income' ? '+' : '-'} ฿${t.amount.toLocaleString()}
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="removeItem(${t.id})" class="text-slate-400 hover:text-red-500 transition-colors">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                `;
                list.appendChild(row);
            });

            document.getElementById('totalIncome').innerText = `฿${income.toLocaleString()}`;
            document.getElementById('totalExpense').innerText = `฿${expense.toLocaleString()}`;
            document.getElementById('balance').innerText = `฿${(income - expense).toLocaleString()}`;

            renderCharts();
        }

        function showAlert(text, type) {
            const container = document.getElementById('alertContainer');
            const div = document.createElement('div');
            div.className = `p-4 mb-3 rounded-2xl shadow-xl border text-white transition-all transform translate-x-full pointer-events-auto flex items-center space-x-3 ${
                type === 'success' ? 'bg-green-500 border-green-600' : 
                type === 'warning' ? 'bg-orange-500 border-orange-600' : 'bg-red-500 border-red-600'
            }`;
            div.innerHTML = `
                <i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-triangle-exclamation'}"></i>
                <span class="text-sm font-medium">${text}</span>
            `;
            container.appendChild(div);

            setTimeout(() => div.classList.replace('translate-x-full', 'translate-x-0'), 10);
            setTimeout(() => {
                div.classList.replace('translate-x-0', 'translate-x-full');
                setTimeout(() => div.remove(), 500);
            }, 3000);
        }

        function renderCharts() {
            const isDark = document.body.classList.contains('dark');
            const textColor = isDark ? '#94a3b8' : '#64748b';

            const catData = {};
            let inc = 0, exp = 0;
            
            transactions.forEach(t => {
                if (t.type === 'expense') {
                    catData[t.category] = (catData[t.category] || 0) + t.amount;
                    exp += t.amount;
                } else {
                    inc += t.amount;
                }
            });

            const pieCtx = document.getElementById('pieChart').getContext('2d');
            if (pieChart) pieChart.destroy();
            pieChart = new Chart(pieCtx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(catData),
                    datasets: [{
                        data: Object.values(catData),
                        backgroundColor: ['#6366f1', '#ec4899', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#94a3b8'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: textColor, font: { family: 'Kanit' } } }
                    }
                }
            });

            const barCtx = document.getElementById('barChart').getContext('2d');
            if (barChart) barChart.destroy();
            barChart = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: ['รายรับ', 'รายจ่าย'],
                    datasets: [{
                        label: 'จำนวนเงิน',
                        data: [inc, exp],
                        backgroundColor: ['#10b981', '#ef4444'],
                        borderRadius: 12
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { color: isDark ? '#1e293b' : '#f1f5f9' },
                            ticks: { color: textColor }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: textColor }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        window.onload = render;
    </script>
</body>
</html>
